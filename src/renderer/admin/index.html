<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PC On Air — Admin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #111;
      --surface: #1e1e1e;
      --border: #333;
      --text: #e0e0e0;
      --text-dim: #888;
      --accent: #4a9eff;
      --green: #3cba54;
      --red: #e53935;
      --orange: #ff9800;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Top bar ── */
    #top-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .app-title {
      font-weight: 700;
      font-size: 13px;
      color: var(--text-dim);
      letter-spacing: 0.04em;
    }

    .app-title span { color: var(--accent); }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-dim);
      margin-left: auto;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--red);
    }
    .status-dot.connected { background: var(--green); }

    #mode-badge {
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      background: var(--border);
      color: var(--text-dim);
    }
    #mode-badge.slides { background: #1a3a5c; color: var(--accent); }
    #mode-badge.url    { background: #1a3a2a; color: var(--green); }
    #mode-badge.l3     { background: #3a2a1a; color: var(--orange); }
    #mode-badge.media-library { background: #2a1a3a; color: #b388ff; }

    /* ── Layout ── */
    #layout {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: 180px;
      min-width: 180px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      padding: 12px 0;
    }

    .sidebar-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
      padding: 8px 14px 4px;
    }

    .nav-item {
      display: block;
      padding: 9px 14px;
      font-size: 13px;
      color: var(--text-dim);
      cursor: pointer;
      border-left: 3px solid transparent;
      user-select: none;
      transition: background 0.1s, color 0.1s;
    }
    .nav-item:hover { background: rgba(255,255,255,0.04); color: var(--text); }
    .nav-item.active {
      background: rgba(74,158,255,0.10);
      color: var(--accent);
      border-left-color: var(--accent);
    }

    .sidebar-spacer { flex: 1; }

    .sidebar-footer {
      padding: 12px 14px;
      border-top: 1px solid var(--border);
    }

    /* ── Main content ── */
    #content {
      flex: 1;
      overflow-y: auto;
      padding: 24px 28px;
    }

    .section-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 20px;
      color: var(--text);
    }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .card-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-dim);
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    /* ── Buttons ── */
    .btn {
      padding: 8px 14px;
      border-radius: 5px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: background 0.1s, border-color 0.1s;
      white-space: nowrap;
    }
    .btn:hover { background: #2a2a2a; border-color: #555; }
    .btn:active { background: #333; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .btn-primary:hover { background: #3a8eef; border-color: #3a8eef; }

    .btn-danger { background: transparent; border-color: var(--red); color: var(--red); }
    .btn-danger:hover { background: rgba(229,57,53,0.12); }

    .btn-success { background: var(--green); border-color: var(--green); color: #fff; }
    .btn-success:hover { background: #2da847; border-color: #2da847; }

    .btn-warn { background: var(--orange); border-color: var(--orange); color: #111; font-weight: 700; }
    .btn-warn:hover { background: #e68900; border-color: #e68900; }

    .btn-sm { padding: 4px 10px; font-size: 12px; }
    .btn-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

    /* ── Inputs ── */
    input[type="text"], input[type="url"], input[type="color"],
    input[type="number"], textarea, select {
      padding: 8px 10px;
      border-radius: 5px;
      border: 1px solid var(--border);
      background: #0d0d0d;
      color: var(--text);
      font-size: 13px;
      font-family: inherit;
    }
    input[type="text"]:focus, input[type="url"]:focus, input[type="number"]:focus,
    textarea:focus, select:focus {
      outline: none;
      border-color: var(--accent);
    }
    input[type="color"] {
      padding: 2px 4px;
      height: 34px;
      cursor: pointer;
    }

    .field-label { font-size: 11px; color: var(--text-dim); margin-bottom: 4px; }
    .field { margin-bottom: 10px; }
    .field input, .field select, .field textarea { width: 100%; }
    .field textarea { resize: vertical; min-height: 60px; }

    /* ── Item list ── */
    .item-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }

    .item-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      background: #161616;
      border: 1px solid var(--border);
      border-radius: 5px;
    }
    .item-row:hover { border-color: #444; }

    .item-name { flex: 1; font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .item-meta { font-size: 11px; color: var(--text-dim); white-space: nowrap; }

    .badge {
      display: inline-block;
      padding: 2px 7px;
      border-radius: 3px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .badge-active { background: rgba(60,186,84,0.2); color: var(--green); }
    .badge-armed  { background: rgba(255,152,0,0.2); color: var(--orange); }

    /* ── Form grid ── */
    .form-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    /* ── State dump ── */
    #state-dump {
      font-size: 11px;
      color: var(--text-dim);
      white-space: pre-wrap;
      word-break: break-all;
      line-height: 1.5;
    }

    /* ── Show lock section ── */
    .lock-status-box {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      min-height: 120px;
      border-radius: 8px;
      border: 2px solid var(--border);
      background: #161616;
      margin-bottom: 16px;
    }
    .lock-status-label {
      font-size: 14px;
      color: var(--text-dim);
      letter-spacing: 0.04em;
    }
    .lock-state-text {
      font-size: 28px;
      font-weight: 700;
    }
    .lock-state-idle    { color: var(--text-dim); }
    .lock-state-armed   { color: var(--orange); }
    .lock-state-locked  { color: var(--red); }

    /* ── Error toast ── */
    #error-toast {
      position: fixed;
      bottom: 16px;
      right: 16px;
      background: var(--red);
      color: #fff;
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 13px;
      display: none;
      max-width: 320px;
      z-index: 100;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
    }

    /* ── Success toast ── */
    #success-toast {
      position: fixed;
      bottom: 52px;
      right: 16px;
      background: var(--green);
      color: #fff;
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 13px;
      display: none;
      max-width: 320px;
      z-index: 100;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
    }

    .empty-state { color: var(--text-dim); font-size: 13px; font-style: italic; padding: 12px 0; }

    hr.sep { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

    /* ── Inline edit form ── */
    .edit-form {
      background: #161616;
      border: 1px solid var(--accent);
      border-radius: 6px;
      padding: 12px;
      margin-top: 8px;
    }
  </style>
</head>
<body>

  <div id="top-bar">
    <div class="app-title">PC On Air <span>ADMIN</span></div>
    <span id="mode-badge">IDLE</span>
    <div class="status-pill">
      <span id="ws-dot" class="status-dot"></span>
      <span id="ws-label">Disconnected</span>
    </div>
  </div>

  <div id="layout">
    <nav id="sidebar">
      <div class="sidebar-label">Overview</div>
      <div class="nav-item active" data-section="dashboard">Dashboard</div>

      <div class="sidebar-label">Setup</div>
      <div class="nav-item" data-section="network">Network</div>
      <div class="nav-item" data-section="monitors">Monitors</div>
      <div class="nav-item" data-section="presets">URL Presets</div>
      <div class="nav-item" data-section="appearance">Appearance</div>

      <div class="sidebar-label">Configuration</div>
      <div class="nav-item" data-section="background">Background</div>
      <div class="nav-item" data-section="l3themes">L3 Themes</div>
      <div class="nav-item" data-section="l3cues">L3 Cues</div>
      <div class="nav-item" data-section="profiles">Profiles</div>

      <div class="sidebar-label">Show Control</div>
      <div class="nav-item" data-section="showlock">Show Lock</div>

      <div class="sidebar-label">System</div>
      <div class="nav-item" data-section="advanced">Advanced</div>
      <div class="nav-item" data-section="logs">Logs</div>
      <div class="nav-item" data-section="system">System</div>

      <div class="sidebar-spacer"></div>
      <div class="sidebar-footer">
        <a href="/admin/health" target="_blank" class="btn btn-sm" style="display:block;text-align:center;text-decoration:none;">
          Health Dashboard ↗
        </a>
      </div>
    </nav>

    <main id="content">
      <!-- injected by renderSection() -->
    </main>
  </div>

  <div id="error-toast"></div>
  <div id="success-toast"></div>

<script>
'use strict';

// ── Global state ──────────────────────────────────────────────────────────────
let state = {};
let section = 'dashboard';

// Show Lock local state
let lockArmed = false;
let lockArmTimer = null;
let lockConfirmationToken = null;

// ── API helper ────────────────────────────────────────────────────────────────
async function api(method, path, body, isFormData) {
  try {
    const opts = {
      method,
      credentials: 'include',
    };
    if (body !== undefined) {
      if (isFormData) {
        opts.body = body;
      } else {
        opts.headers = { 'Content-Type': 'application/json' };
        opts.body = JSON.stringify(body);
      }
    }
    const res = await fetch(path, opts);
    if (res.status === 204) return null;
    const text = await res.text();
    if (!text) return null;
    let json;
    try { json = JSON.parse(text); } catch { /* non-JSON body */ }
    if (!res.ok) throw new Error(json?.error?.message || json?.error || json?.message || `HTTP ${res.status}`);
    return json;
  } catch (e) {
    showError(e.message);
    throw e;
  }
}

// ── Toasts ────────────────────────────────────────────────────────────────────
let errorTimer = null;
function showError(msg) {
  const el = document.getElementById('error-toast');
  el.textContent = msg;
  el.style.display = 'block';
  clearTimeout(errorTimer);
  errorTimer = setTimeout(() => { el.style.display = 'none'; }, 4000);
}

let successTimer = null;
function showSuccess(msg) {
  const el = document.getElementById('success-toast');
  el.textContent = msg;
  el.style.display = 'block';
  clearTimeout(successTimer);
  successTimer = setTimeout(() => { el.style.display = 'none'; }, 2500);
}

// ── WebSocket ─────────────────────────────────────────────────────────────────
function connectWS() {
  const ws = new WebSocket('ws://' + location.host + '/ws');

  ws.onopen = () => {
    document.getElementById('ws-dot').classList.add('connected');
    document.getElementById('ws-label').textContent = 'Connected';
  };

  ws.onclose = () => {
    document.getElementById('ws-dot').classList.remove('connected');
    document.getElementById('ws-label').textContent = 'Disconnected';
    setTimeout(connectWS, 2000);
  };

  ws.onmessage = (ev) => {
    try {
      const msg = JSON.parse(ev.data);
      if (msg.type === 'state' || msg.type === 'stateUpdate') {
        state = msg.payload || msg.state || msg;
        updateTopBar();
        if (section === 'dashboard') renderDashboard();
      }
    } catch (_) { /* ignore non-JSON */ }
  };

  ws.onerror = () => ws.close();
}

function updateTopBar() {
  const badge = document.getElementById('mode-badge');
  const mode = (state.mode || 'idle').toLowerCase().replace(/[^a-z-]/g, '');
  badge.textContent = mode.toUpperCase().replace('-', ' ');
  badge.className = '';
  badge.id = 'mode-badge';
  if (['slides','url','l3','media-library'].includes(mode)) badge.classList.add(mode);
}

// ── Navigation ────────────────────────────────────────────────────────────────
function navigate(s) {
  section = s;
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.section === s);
  });
  renderSection();
}

function renderSection() {
  switch (section) {
    case 'dashboard':  renderDashboard(); break;
    case 'network':    renderNetwork(); break;
    case 'monitors':   renderMonitors(); break;
    case 'presets':    renderPresets(); break;
    case 'appearance': renderAppearance(); break;
    case 'background': renderBackground(); break;
    case 'l3themes':   renderL3Themes(); break;
    case 'l3cues':     renderL3Cues(); break;
    case 'profiles':   renderProfiles(); break;
    case 'showlock':   renderShowLock(); break;
    case 'advanced':   renderAdvanced(); break;
    case 'logs':       renderLogs(); break;
    case 'system':     renderSystem(); break;
  }
}

document.querySelectorAll('.nav-item').forEach(el => {
  el.addEventListener('click', () => navigate(el.dataset.section));
});

// ── Helpers ───────────────────────────────────────────────────────────────────
function content() { return document.getElementById('content'); }

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Section: Dashboard ────────────────────────────────────────────────────────
// ── Section: Dashboard ────────────────────────────────────────────────────────
async function renderDashboard() {
  content().innerHTML = '<div class="section-title">Dashboard</div><div class="card"><div class="card-title">Loading…</div></div>';
  let info, st;
  try {
    const [infoR, stateR] = await Promise.all([
      fetch('/api/server-info', { credentials: 'include' }),
      fetch('/api/status', { credentials: 'include' }),
    ]);
    info = await infoR.json();
    st = await stateR.json();
  } catch (e) {
    showError('Failed to load dashboard: ' + e.message);
    return;
  }

  content().innerHTML = `
    <div class="section-title">Dashboard</div>

    <div class="card">
      <div class="card-title">Machine</div>
      <div style="display:flex;gap:8px;align-items:center;">
        <input id="machine-name-input" type="text" value="${escHtml(info.machineName)}" style="flex:1;" />
        <button class="btn btn-sm btn-primary" id="save-machine-name-btn">Save</button>
      </div>
      <p style="color:var(--text-dim);font-size:12px;margin-top:6px;">This name appears in the operator web UI header.</p>
    </div>

    <div class="card">
      <div class="card-title">Share URLs — Operator</div>
      ${info.operatorUrls.map(u => `<div style="font-family:monospace;font-size:12px;background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:4px 8px;margin-bottom:4px;word-break:break-all;user-select:all;">${escHtml(u)}</div>`).join('')}
    </div>

    <div class="card">
      <div class="card-title">Share URLs — Admin</div>
      ${info.adminUrls.map(u => `<div style="font-family:monospace;font-size:12px;background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:4px 8px;margin-bottom:4px;word-break:break-all;user-select:all;">${escHtml(u)}</div>`).join('')}
    </div>

    <div class="card">
      <div class="card-title">Share URLs — Companion API</div>
      ${info.companionUrls.map(u => `<div style="font-family:monospace;font-size:12px;background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:4px 8px;margin-bottom:4px;word-break:break-all;user-select:all;">${escHtml(u)}</div>`).join('')}
    </div>

    <div class="card">
      <div class="card-title">Status</div>
      <table style="width:100%;border-collapse:collapse;font-size:13px;margin-bottom:12px;">
        <tr><td style="padding:4px 8px;color:var(--text-dim);width:160px;">Mode</td><td><strong>${escHtml(String(st.currentMode || 'idle'))}</strong></td></tr>
        <tr><td style="padding:4px 8px;color:var(--text-dim);">Connected clients</td><td>${st.connectionStatus?.webSocketClients ?? 0}</td></tr>
        <tr><td style="padding:4px 8px;color:var(--text-dim);">Uptime</td><td>${Math.floor(info.uptime / 60)}m ${info.uptime % 60}s</td></tr>
        <tr><td style="padding:4px 8px;color:var(--text-dim);">Companion</td><td>${st.connectionStatus?.companionConnected ? '✓ Connected' : '✗ Disconnected'}</td></tr>
      </table>
      <div class="btn-row">
        <button class="btn btn-sm btn-danger" id="dash-panic-btn">PANIC</button>
        <button class="btn btn-sm" id="dash-ab-btn">Switch A/B</button>
        <button class="btn btn-sm" id="dash-refresh-btn">↺ Refresh</button>
      </div>
    </div>
  `;

  document.getElementById('save-machine-name-btn').addEventListener('click', async () => {
    const name = document.getElementById('machine-name-input').value.trim();
    if (!name) { showError('Name cannot be empty'); return; }
    try {
      const activeJ = await api('GET', '/api/profiles/active');
      await api('PATCH', '/api/profiles/' + activeJ.id, { name });
      showSuccess('Machine name saved');
    } catch { /* api() shows the error */ }
  });

  document.getElementById('dash-refresh-btn').addEventListener('click', () => renderDashboard());

  document.getElementById('dash-panic-btn').addEventListener('click', async () => {
    try {
      await api('POST', '/api/panic', { action: 'toggle' });
      renderDashboard();
    } catch { /* handled */ }
  });

  document.getElementById('dash-ab-btn').addEventListener('click', async () => {
    const inst = st.abState?.activeInstance === 'A' ? 'B' : 'A';
    try {
      await api('POST', '/api/ab/switch', { instance: inst });
      renderDashboard();
    } catch { /* handled */ }
  });
}

// ── Section: URL Presets ──────────────────────────────────────────────────────
async function renderPresets() {
  content().innerHTML = `<div class="section-title">URL Presets</div><div class="card"><div class="card-title">Loading…</div></div>`;
  let data;
  try { data = await api('GET', '/api/presets'); } catch { return; }
  const presets = (data && data.presets) || [];

  content().innerHTML = `
    <div class="section-title">URL Presets</div>
    <div class="card">
      <div class="card-title">Presets (${presets.length})</div>
      <div class="item-list" id="presets-list">
        ${presets.length === 0 ? '<div class="empty-state">No presets yet.</div>' : presets.map(p => `
          <div class="item-row" data-id="${escHtml(p.id)}">
            <div class="item-name">${escHtml(p.name)}</div>
            <div class="item-meta">${escHtml(p.url)}</div>
            <button class="btn btn-sm preset-load-btn" data-url="${escHtml(p.url)}">Load</button>
            <button class="btn btn-sm btn-danger preset-del-btn" data-id="${escHtml(p.id)}">Delete</button>
          </div>`).join('')}
      </div>
    </div>
    <div class="card">
      <div class="card-title">Add Preset</div>
      <div class="field">
        <div class="field-label">Name</div>
        <input type="text" id="new-preset-name" placeholder="My Preset" />
      </div>
      <div class="field">
        <div class="field-label">URL</div>
        <input type="url" id="new-preset-url" placeholder="https://…" />
      </div>
      <button class="btn btn-primary" id="add-preset-btn">Add Preset</button>
    </div>
  `;

  document.querySelectorAll('.preset-del-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      if (!confirm('Delete this preset?')) return;
      await api('DELETE', `/api/presets/${btn.dataset.id}`);
      showSuccess('Preset deleted'); renderPresets();
    });
  });

  document.querySelectorAll('.preset-load-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      await api('POST', '/api/mode', { mode: 'url' });
      await api('POST', '/api/url', { url: btn.dataset.url });
      showSuccess('URL loaded');
    });
  });

  document.getElementById('add-preset-btn').addEventListener('click', async () => {
    const name = document.getElementById('new-preset-name').value.trim();
    const url  = document.getElementById('new-preset-url').value.trim();
    if (!name || !url) { showError('Name and URL are required'); return; }
    await api('POST', '/api/presets', { name, url });
    showSuccess('Preset added'); renderPresets();
  });
}

// ── Section: Background ───────────────────────────────────────────────────────
async function renderBackground() {
  content().innerHTML = `<div class="section-title">Background</div><div class="card"><div class="card-title">Loading…</div></div>`;
  let bgData, presetsData;
  try {
    [bgData, presetsData] = await Promise.all([
      api('GET', '/api/background'),

// ── Section: Show Lock ────────────────────────────────────────────────────────
function renderShowLock() {
  const serverLocked = !!(state.connectionStatus && state.connectionStatus.adminShowLocked);
  const stateClass = serverLocked ? 'lock-state-locked' : lockArmed ? 'lock-state-armed' : 'lock-state-idle';
  const statusText = serverLocked ? 'SHOW LOCKED' : lockArmed ? 'ARMED' : 'DISARMED';
  const armDisabled = lockArmed || serverLocked;

  content().innerHTML = `
    <div class="section-title">Show Lock</div>
    <div class="card" style="max-width:480px;">
      <div class="card-title">Show Lock Control</div>
      <div class="lock-status-box" id="lock-status-box">
        <div class="lock-status-label">Show Lock State</div>
        <div class="lock-state-text ${stateClass}" id="lock-state-text">${statusText}</div>
        ${serverLocked ? '<div style="font-size:12px;color:var(--red);">Server-confirmed lock active</div>' : lockArmed ? '<div style="font-size:12px;color:var(--orange);">Armed — click TAKE within 10 seconds</div>' : ''}
      </div>
      <div class="btn-row">
        <button class="btn btn-warn" id="arm-btn" ${armDisabled ? 'disabled' : ''}>ARM</button>
        <button class="btn btn-danger" id="take-btn" ${!lockArmed ? 'disabled' : ''} style="font-weight:700;">TAKE (Lock Show)</button>
        <button class="btn" id="unlock-btn">UNLOCK</button>
      </div>
      <p style="font-size:12px;color:var(--text-dim);margin-top:14px;line-height:1.6;">
        Show Lock prevents mode changes and output modifications.
        <br>ARM first, then TAKE within 10 seconds to activate the lock.
        <br>Requires admin session.
      </p>
    </div>
  `;

  document.getElementById('arm-btn').addEventListener('click', async () => {
    if (lockArmed) return;
    try {
      const res = await api('POST', '/api/show-lock', { action: 'lock' });
      lockConfirmationToken = (res && res.confirmationToken) || null;
      lockArmed = true;
      clearTimeout(lockArmTimer);
      lockArmTimer = setTimeout(() => {
        lockArmed = false;
        lockConfirmationToken = null;
        if (section === 'showlock') renderShowLock();
      }, 10000);
      showSuccess('Show Lock armed — click TAKE within 10s');
      renderShowLock();
    } catch { /* showError handled in api() */ }
  });

  document.getElementById('take-btn').addEventListener('click', async () => {
    if (!confirm('Lock the show? This will prevent further output changes.')) return;
    try {
      await api('POST', '/api/show-lock', { action: 'lock', confirmationToken: lockConfirmationToken });
      lockArmed = false;
      lockConfirmationToken = null;
      clearTimeout(lockArmTimer);
      showSuccess('Show Locked');
      renderShowLock();
    } catch { /* showError handled in api() */ }
  });

  document.getElementById('unlock-btn').addEventListener('click', async () => {
    if (!confirm('Unlock the show?')) return;
    try {
      await api('POST', '/api/show-lock', { action: 'unlock' });
      lockArmed = false;
      lockConfirmationToken = null;
      clearTimeout(lockArmTimer);
      showSuccess('Show Unlocked');
      renderShowLock();
    } catch { /* showError handled in api() */ }
  });
}

      await Promise.all([
        api('POST', '/api/action', { action_id: 'set_display', params: { display: displayA, instance: 'A' } }),
        api('POST', '/api/action', { action_id: 'set_display', params: { display: displayB, instance: 'B' } }),
      ]);
      showSuccess('Display assignment saved');
    } catch { /* showError handled in api() */ }
  });

  // Save allowlist
  document.getElementById('save-allowlist-btn').addEventListener('click', async () => {
    if (!activeProfileData) { showError('No active profile'); return; }
    const enabled = document.getElementById('allowlist-enabled-cb').checked;
    const raw = document.getElementById('allowlist-textarea').value;
    const ips = raw.split('\n').map(s => s.trim()).filter(Boolean);
    try {
      await api('PATCH', `/api/profiles/${activeProfileData.id}`, {
        appPreferences: {
          ipAllowlistEnabled: enabled,
          ipAllowlist: ips.length > 0 ? ips : null,
        },
      });
      showSuccess('Allowlist saved — restart the app to apply');
    } catch { /* showError handled in api() */ }
  });
}

// ── Network ──────────────────────────────────────────────────────────────────
async function renderNetwork() {
  content().innerHTML = '<div class="section-title">Network</div><div class="card"><div class="card-title">Loading…</div></div>';
  let info, profile;
  try {
    const [infoR, profileR] = await Promise.all([
      fetch('/api/server-info', { credentials: 'include' }),
      fetch('/api/profiles/active', { credentials: 'include' }),
    ]);
    info = await infoR.json();
    profile = await profileR.json();
  } catch (e) { showError(e.message); return; }

  const allowlist = (profile.appPreferences?.ipAllowlist ?? []).slice();
  const allowlistEnabled = profile.appPreferences?.ipAllowlistEnabled ?? false;

  function renderAllowlistItems() {
    return allowlist.length
      ? allowlist.map((ip, i) => `
          <div class="item-row" data-idx="${i}">
            <span class="item-name">${escHtml(ip)}</span>
            <button class="btn btn-sm btn-danger allowlist-del-btn" data-idx="${i}">Remove</button>
          </div>`).join('')
      : '<p style="color:var(--text-dim);font-size:12px;">No entries — all IPs allowed.</p>';
  }

  content().innerHTML = `
    <div class="section-title">Network</div>

    <div class="card">
      <div class="card-title">Share URLs — Operator (port ${info.port})</div>
      ${info.operatorUrls.map(u => `<div style="font-family:monospace;font-size:12px;background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:4px 8px;margin-bottom:4px;word-break:break-all;user-select:all;">${escHtml(u)}</div>`).join('')}
    </div>

    <div class="card">
      <div class="card-title">Share URLs — Companion API (port ${info.port})</div>
      ${info.companionUrls.map(u => `<div style="font-family:monospace;font-size:12px;background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:4px 8px;margin-bottom:4px;word-break:break-all;user-select:all;">${escHtml(u)}</div>`).join('')}
    </div>

    <div class="card">
      <div class="card-title">Ports</div>
      <table style="width:100%;border-collapse:collapse;font-size:13px;">
        <tr><td style="padding:4px 8px;color:var(--text-dim);width:180px;">Web UI / API Port</td><td>${info.port}</td></tr>
      </table>
      <p style="color:var(--text-dim);font-size:12px;margin-top:8px;">To change the port, restart the app with the <code>--port</code> flag.</p>
    </div>

    <div class="card">
      <div class="card-title">IP Allowlist</div>
      <label style="display:flex;gap:8px;align-items:center;margin-bottom:12px;cursor:pointer;">
        <input type="checkbox" id="allowlist-enabled-cb" ${allowlistEnabled ? 'checked' : ''} />
        <span>Enable IP allowlist (block all other IPs)</span>
      </label>
      <div id="allowlist-items">${renderAllowlistItems()}</div>
      <div style="display:flex;gap:8px;margin-top:12px;">
        <input type="text" id="new-allowlist-ip" placeholder="192.168.1.0/24 or hostname" style="flex:1;" />
        <button class="btn btn-sm btn-primary" id="add-allowlist-btn">Add</button>
      </div>
      <div class="btn-row" style="margin-top:10px;">
        <button class="btn btn-sm btn-primary" id="save-allowlist-btn">Save Allowlist</button>
      </div>
    </div>
  `;

  function bindDelButtons() {
    document.querySelectorAll('.allowlist-del-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const idx = parseInt(btn.dataset.idx);
        allowlist.splice(idx, 1);
        document.getElementById('allowlist-items').innerHTML = renderAllowlistItems();
        bindDelButtons();
      });
    });
  }
  bindDelButtons();

  document.getElementById('allowlist-enabled-cb').addEventListener('change', async (e) => {
    const enabled = e.target.checked;
    try {
      const activeJ = await api('GET', '/api/profiles/active');
      await api('PATCH', '/api/profiles/' + activeJ.id, { appPreferences: { ipAllowlistEnabled: enabled } });
      showSuccess('Allowlist ' + (enabled ? 'enabled' : 'disabled'));
    } catch { /* handled */ }
  });

  document.getElementById('add-allowlist-btn').addEventListener('click', () => {
    const val = document.getElementById('new-allowlist-ip').value.trim();
    if (!val) return;
    allowlist.push(val);
    document.getElementById('allowlist-items').innerHTML = renderAllowlistItems();
    document.getElementById('new-allowlist-ip').value = '';
    bindDelButtons();
  });

  document.getElementById('save-allowlist-btn').addEventListener('click', async () => {
    try {
      const activeJ = await api('GET', '/api/profiles/active');
      await api('PATCH', '/api/profiles/' + activeJ.id, { appPreferences: { ipAllowlist: allowlist.slice() } });
      showSuccess('Allowlist saved');
    } catch { /* handled */ }
  });
}

// ── Monitors ─────────────────────────────────────────────────────────────────
async function renderMonitors() {
  content().innerHTML = '<div class="section-title">Monitors</div><div class="card"><div class="card-title">Loading…</div></div>';
  let displays, profile;
  try {
    const [dR, pR] = await Promise.all([
      fetch('/api/displays', { credentials: 'include' }),
      fetch('/api/profiles/active', { credentials: 'include' }),
    ]);
    displays = (await dR.json()).displays ?? [];
    const activeProfile = await pR.json();
    // /api/profiles/active only returns id/name/dates; fetch full profile for displayPreference
    profile = await api('GET', '/api/profiles/' + activeProfile.id);
    if (!profile) profile = activeProfile;
  } catch (e) { showError(e.message); return; }

  const currentPref = profile.displayPreference ?? '';

  content().innerHTML = `
    <div class="section-title">Monitors</div>

    <div class="card">
      <div class="card-title">Connected Displays</div>
      ${displays.length === 0
        ? '<p style="color:var(--text-dim);font-size:12px;">No displays detected.</p>'
        : displays.map(d => `
          <div class="item-row">
            <span class="item-name">${escHtml(d.name || ('Display ' + d.id))}</span>
            <span class="item-meta">${d.bounds ? (d.bounds.width + '×' + d.bounds.height) : ''} ${d.isPrimary ? '(primary)' : ''}</span>
          </div>`).join('')}
    </div>

    <div class="card">
      <div class="card-title">Presentation Monitor</div>
      <p style="color:var(--text-dim);font-size:12px;margin-bottom:12px;">Select which display the program output window uses. Takes effect on next mode change or app restart.</p>
      <select id="display-select" style="width:100%;margin-bottom:12px;">
        <option value="">Auto (primary display)</option>
        ${displays.map(d => `<option value="${escHtml(String(d.id))}" ${currentPref === String(d.id) ? 'selected' : ''}>${escHtml(d.name || ('Display ' + d.id))}</option>`).join('')}
      </select>
      <button class="btn btn-sm btn-primary" id="save-display-btn">Save</button>
    </div>
  `;

  document.getElementById('save-display-btn').addEventListener('click', async () => {
    const val = document.getElementById('display-select').value;
    try {
      await api('PATCH', '/api/profiles/' + profile.id, { displayPreference: val || null });
      showSuccess('Display preference saved. Restart or change mode to apply.');
    } catch { /* handled */ }
  });
}

// ── Appearance ───────────────────────────────────────────────────────────────
async function renderAppearance() {
  content().innerHTML = '<div class="section-title">Appearance</div><div class="card"><div class="card-title">Loading…</div></div>';
  let profile, profileFull;
  try {
    const activeR = await fetch('/api/profiles/active', { credentials: 'include' });
    profile = await activeR.json();
    const fullR = await fetch('/api/profiles/' + profile.id, { credentials: 'include' });
    profileFull = await fullR.json();
  } catch (e) { showError(e.message); return; }

  const theme = profileFull.appPreferences?.operatorTheme ?? 'light';

  content().innerHTML = `
    <div class="section-title">Appearance</div>

    <div class="card">
      <div class="card-title">Operator Web UI Theme</div>
      <p style="color:var(--text-dim);font-size:12px;margin-bottom:12px;">Changes how the operator web remote looks for anyone accessing it in a browser.</p>
      <div style="display:flex;gap:16px;margin-bottom:16px;">
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer;">
          <input type="radio" name="op-theme" value="light" ${theme === 'light' ? 'checked' : ''} />
          Light
        </label>
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer;">
          <input type="radio" name="op-theme" value="dark" ${theme === 'dark' ? 'checked' : ''} />

      </div>

  });
}

// ── Advanced ─────────────────────────────────────────────────────────────────
async function renderAdvanced() {
  content().innerHTML = '<div class="section-title">Advanced</div><div class="card"><div class="card-title">Loading…</div></div>';
  let profileFull;
  try {
    const activeR = await fetch('/api/profiles/active', { credentials: 'include' });
    const profile = await activeR.json();
    const fullR = await fetch('/api/profiles/' + profile.id, { credentials: 'include' });
    profileFull = await fullR.json();
  } catch (e) { showError(e.message); return; }

  const gpuMode = profileFull.appPreferences?.gpuMode ?? 'default';
  const verboseLogging = profileFull.appPreferences?.verboseLogging ?? false;

  content().innerHTML = `
    <div class="section-title">Advanced</div>

    <div class="card">
      <div class="card-title">Logging</div>
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer;margin-bottom:8px;">
        <input type="checkbox" id="verbose-log-cb" ${verboseLogging ? 'checked' : ''} />
        <span>Enable verbose logging (console.log captured to Logs tab)</span>
      </label>
      <button class="btn btn-sm btn-primary" id="save-verbose-btn">Save</button>
    </div>

    <div class="card">
      <div class="card-title">Presentation Rendering</div>
      <p style="color:var(--text-dim);font-size:12px;margin-bottom:12px;">GPU mode for rendering Google Slides. Change if slide images show transparency or rendering glitches. <strong>Restart required.</strong></p>
      <select id="gpu-mode-select" style="width:100%;margin-bottom:12px;">
        <option value="default" ${gpuMode === 'default' ? 'selected' : ''}>Default (Chromium decides)</option>
        <option value="angle" ${gpuMode === 'angle' ? 'selected' : ''}>ANGLE Metal (macOS)</option>
        <option value="disabled" ${gpuMode === 'disabled' ? 'selected' : ''}>Disable GPU</option>
      </select>

    <div class="card">

      <p style="color:var(--accent);font-size:12px;margin-top:4px;">Coming in v1.5</p>

      const activeR = await fetch('/api/profiles/active', { credentials: 'include' });
      const activeJ = await activeR.json();
      await api('PATCH', '/api/profiles/' + activeJ.id, { appPreferences: { verboseLogging: enabled } });
      showSuccess('Logging setting saved');
    } catch { /* handled */ }
  });

  document.getElementById('save-gpu-btn').addEventListener('click', async () => {
    const mode = document.getElementById('gpu-mode-select').value;
    try {
      const activeR = await fetch('/api/profiles/active', { credentials: 'include' });
      const activeJ = await activeR.json();
      await api('PATCH', '/api/profiles/' + activeJ.id, { appPreferences: { gpuMode: mode } });
      showSuccess('GPU mode saved. Restart the app to apply.');
    } catch { /* handled */ }
  });
}

// ── Logs ─────────────────────────────────────────────────────────────────────
async function renderLogs() {
  content().innerHTML = '<div class="section-title">Logs</div><div class="card"><div class="card-title">Loading…</div></div>';
  let logsData;
  try {
    const r = await fetch('/api/logs', { credentials: 'include' });
    logsData = await r.json();
  } catch (e) { showError(e.message); return; }

  const entries = logsData.entries ?? [];

  function formatEntries(list) {
    if (!list.length) return '<em style="color:var(--text-dim)">No log entries yet.</em>';
    return list.map(e => {
      const color = e.level === 'error' ? '#ff6b6b' : e.level === 'warn' ? '#ffd93d' : 'var(--text-dim)';
      return `<div style="color:${color};font-size:11px;line-height:1.5;word-break:break-all;">[${escHtml(e.ts.slice(11,19))}] ${escHtml(e.level.toUpperCase())} ${escHtml(e.message)}</div>`;
    }).join('');
  }

  content().innerHTML = `
    <div class="section-title">Logs</div>

    <div class="card">
      <div class="card-title">Debug Console</div>
      <div class="btn-row" style="margin-bottom:10px;">
        <button class="btn btn-sm" id="logs-refresh-btn">↺ Refresh</button>
        <button class="btn btn-sm btn-danger" id="logs-clear-btn">Clear</button>
        <button class="btn btn-sm" id="logs-save-btn">Save as file</button>
      </div>
      <div id="log-output" style="background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:12px;max-height:400px;overflow-y:auto;font-family:monospace;">
        ${formatEntries(entries)}
      </div>
    </div>
  `;

  document.getElementById('logs-refresh-btn').addEventListener('click', async () => {
    const r = await fetch('/api/logs', { credentials: 'include' });
    const j = await r.json();
    document.getElementById('log-output').innerHTML = formatEntries(j.entries ?? []);
  });

  document.getElementById('logs-clear-btn').addEventListener('click', async () => {
    await api('POST', '/api/logs/clear');
    document.getElementById('log-output').innerHTML = formatEntries([]);
  });

  document.getElementById('logs-save-btn').addEventListener('click', async () => {
    const r = await fetch('/api/logs', { credentials: 'include' });
    const j = await r.json();
    const text = (j.entries ?? []).map(e => `[${e.ts}] ${e.level.toUpperCase()} ${e.message}`).join('\n');
    const blob = new Blob([text], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'pconair-log-' + new Date().toISOString().slice(0,19).replace(/:/g,'-') + '.txt';
    a.click();
    URL.revokeObjectURL(url);
  });
}

  // Load initial state
  try {
    const s = await api('GET', '/api/status');
    if (s) { state = s; updateTopBar(); }
  } catch { /* proceed without initial state */ }

  renderSection();
  connectWS();
})();
</script>
