<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PC On Air — Operator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #111;
      --surface: #1e1e1e;
      --border: #333;
      --text: #e0e0e0;
      --text-dim: #888;
      --accent: #4a9eff;
      --green: #3cba54;
      --red: #e53935;
      --orange: #ff9800;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #status-bar {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 8px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #status-bar .app-title {
      font-weight: 600;
      font-size: 13px;
      color: var(--text-dim);
      margin-right: auto;
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-dim);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--red);
    }

    .status-dot.connected { background: var(--green); }

    #mode-badge {
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      background: var(--border);
      color: var(--text-dim);
    }

    #mode-badge.slides { background: #1a3a5c; color: var(--accent); }
    #mode-badge.url    { background: #1a3a2a; color: var(--green); }
    #mode-badge.l3     { background: #3a2a1a; color: var(--orange); }

    #main {
      flex: 1;
      display: flex;
      gap: 0;
      overflow: hidden;
    }

    .panel {
      padding: 16px;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow-y: auto;
    }

    .panel:last-child { border-right: none; flex: 1; }

    .panel-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-dim);
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    .btn {
      padding: 8px 14px;
      border-radius: 5px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: background 0.1s, border-color 0.1s;
      white-space: nowrap;
    }

    .btn:hover { background: #2a2a2a; border-color: #555; }
    .btn:active { background: #333; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .btn-primary:hover { background: #3a8eef; border-color: #3a8eef; }

    .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }

    .btn-nav { flex: 1; text-align: center; font-size: 18px; padding: 12px; }

    input[type="text"], input[type="number"] {
      width: 100%;
      padding: 8px 10px;
      border-radius: 5px;
      border: 1px solid var(--border);
      background: #0d0d0d;
      color: var(--text);
      font-size: 13px;
    }

    input[type="text"]:focus, input[type="number"]:focus {
      outline: none;
      border-color: var(--accent);
    }

    select {
      width: 100%;
      padding: 8px 10px;
      border-radius: 5px;
      border: 1px solid var(--border);
      background: #0d0d0d;
      color: var(--text);
      font-size: 13px;
    }

    select:focus {
      outline: none;
      border-color: var(--accent);
    }

    .field-label { font-size: 11px; color: var(--text-dim); margin-bottom: 4px; }

    .stack-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .stack-row input[type="checkbox"] {
      width: auto;
      accent-color: var(--accent);
    }

    #slide-counter {
      font-size: 28px;
      font-weight: 700;
      color: var(--accent);
      text-align: center;
    }

    #deck-title {
      font-size: 12px;
      color: var(--text-dim);
      text-align: center;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .ab-btn {
      flex: 1;
      padding: 16px;
      text-align: center;
      font-size: 24px;
      font-weight: 700;
      border-radius: 6px;
      border: 2px solid var(--border);
    }

    .ab-btn.active { border-color: var(--accent); color: var(--accent); background: #1a2a3a; }

    #error-toast {
      position: fixed;
      bottom: 16px;
      right: 16px;
      background: var(--red);
      color: #fff;
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 13px;
      display: none;
      max-width: 300px;
      z-index: 100;
    }
  </style>
</head>
<body>

  <div id="status-bar">
    <span class="app-title">PC On Air</span>
    <span id="active-profile" class="status-pill" title="Active show profile">—</span>
    <span id="mode-badge">IDLE</span>
    <span class="status-pill">
      <span id="ws-dot" class="status-dot"></span>
      <span id="ws-label">Disconnected</span>
    </span>
    <span class="status-pill">
      <span id="companion-dot" class="status-dot"></span>
      <span>Companion</span>
    </span>
  </div>

  <div id="main">

    <div class="panel" style="width: 280px; min-width: 280px;">
      <div class="panel-title">Slides</div>
      <div>
        <div class="field-label">Google Slides URL</div>
        <input type="text" id="deck-url-input" placeholder="https://docs.google.com/presentation/d/…" />
      </div>
      <button class="btn btn-primary" id="load-btn">Load Deck</button>
      <div id="slide-counter">— / —</div>
      <div id="deck-title">No deck loaded</div>
      <div class="btn-row">
        <button class="btn btn-nav" id="prev-btn" disabled>‹</button>
        <button class="btn btn-nav" id="next-btn" disabled>›</button>
      </div>
      <div>
        <div class="field-label">Go to slide (1-based)</div>
        <div class="btn-row">
          <input type="number" id="goto-input" min="1" style="flex:1;" placeholder="1" />
          <button class="btn" id="goto-btn" disabled>Go</button>
        </div>
      </div>
      <button class="btn" id="reload-btn" disabled>Reload Deck</button>

      <div class="panel-title" style="margin-top: 20px; padding-top: 12px; border-top: 1px solid var(--border);">URL</div>
      <div>
        <div class="field-label">Page URL</div>
        <input type="text" id="url-input" placeholder="https://…" />
      </div>
      <div>
        <div class="field-label">Display ID (optional)</div>
        <input type="text" id="url-display-input" placeholder="Match a display from status" />
      </div>
      <button class="btn btn-primary" id="url-load-btn">Load URL</button>
      <div id="url-status" class="field-label" style="margin-top: 8px; line-height: 1.4;"></div>
      <button class="btn" id="url-reload-btn" disabled>Reload active URL</button>

      <div class="panel-title" style="margin-top: 20px; padding-top: 12px; border-top: 1px solid var(--border);">Lower Thirds</div>
      <div id="l3-active-line" class="field-label" style="line-height: 1.4;">Active: —</div>
      <div>
        <div class="field-label">Cue from library</div>
        <div class="btn-row" style="align-items: stretch;">
          <select id="l3-cue-select" style="flex: 1;">
            <option value="">— Manual entry below —</option>
          </select>
          <button class="btn" type="button" id="l3-cues-refresh-btn" title="Reload cue list">↻</button>
        </div>
      </div>
      <div>
        <div class="field-label">Name (manual take)</div>
        <input type="text" id="l3-name-input" placeholder="Speaker name" autocomplete="off" />
      </div>
      <div>
        <div class="field-label">Title (manual take)</div>
        <input type="text" id="l3-title-input" placeholder="Role or second line" autocomplete="off" />
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" type="button" id="l3-take-btn">Take</button>
        <button class="btn" type="button" id="l3-clear-btn">Clear</button>
      </div>
      <label class="stack-row" style="cursor: pointer; user-select: none;">
        <input type="checkbox" id="l3-stacking-checkbox" />
        <span>Stacking (keep previous on new take)</span>
      </label>
    </div>

    <div class="panel" style="width: 200px; min-width: 200px;">
      <div class="panel-title">A/B Instance</div>
      <div class="btn-row">
        <button class="btn ab-btn" id="ab-a-btn" data-instance="A">A</button>
        <button class="btn ab-btn" id="ab-b-btn" data-instance="B">B</button>
      </div>
      <div class="panel-title" style="margin-top: 8px;">Mode</div>
      <button class="btn" data-mode="idle" id="mode-idle-btn">Idle</button>
      <button class="btn" data-mode="slides" id="mode-slides-btn">Slides</button>
      <button class="btn" data-mode="url" id="mode-url-btn">URL</button>
      <button class="btn" data-mode="l3" id="mode-l3-btn">Lower Thirds</button>
    </div>

    <div class="panel">
      <div class="panel-title">Status</div>
      <pre id="state-dump" style="font-size:11px; color: var(--text-dim); white-space: pre-wrap; word-break: break-all;"></pre>
    </div>

  </div>

  <div id="error-toast"></div>

  <script src="./index.js"></script>
</body>
</html>
